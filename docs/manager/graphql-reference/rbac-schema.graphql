# RBAC (Role-Based Access Control) GraphQL Schema
# Extracted from v2-schema.graphql — Added in 26.3.0
#
# This file contains only the RBAC-specific types, inputs, enums, queries, and mutations.
# All RBAC operations require superadmin privileges (admin_ prefix).
#
# Dependencies on shared types (not included here):
#   - Node (interface), PageInfo, OrderDirection, StringFilter, UUID, DateTime, ID

# =============================================================================
# Enums
# =============================================================================

"""
Added in 26.3.0. Unified RBAC element type for scope-entity relationships
"""
enum RBACElementType {
  # Scope hierarchy
  DOMAIN
  PROJECT
  USER

  # Root-query-enabled entities (scoped)
  SESSION
  VFOLDER
  DEPLOYMENT
  MODEL_DEPLOYMENT
  KEYPAIR
  NOTIFICATION_CHANNEL
  NETWORK
  RESOURCE_GROUP
  CONTAINER_REGISTRY
  STORAGE_HOST
  IMAGE
  ARTIFACT
  ARTIFACT_REGISTRY
  SESSION_TEMPLATE
  APP_CONFIG

  # Root-query-enabled entities (superadmin-only)
  RESOURCE_PRESET
  USER_RESOURCE_POLICY
  KEYPAIR_RESOURCE_POLICY
  PROJECT_RESOURCE_POLICY
  ROLE
  AUDIT_LOG
  EVENT_LOG

  # Auto-only entities used in permissions
  NOTIFICATION_RULE

  # Entity-level scopes
  ARTIFACT_REVISION
}

"""Added in 26.3.0. RBAC operation type"""
enum OperationType {
  CREATE
  READ
  UPDATE
  SOFT_DELETE
  HARD_DELETE
  GRANT_ALL
  GRANT_READ
  GRANT_UPDATE
  GRANT_SOFT_DELETE
  GRANT_HARD_DELETE
}

"""Added in 26.3.0. Role definition source"""
enum RoleSource {
  SYSTEM
  CUSTOM
}

"""Added in 26.3.0. Role status"""
enum RoleStatus {
  ACTIVE
  INACTIVE
  DELETED
}

"""Added in 26.3.0. Role ordering field"""
enum RoleOrderField {
  NAME
  CREATED_AT
  UPDATED_AT
}

"""Added in 26.3.0. Permission ordering field"""
enum PermissionOrderField {
  ID
  ENTITY_TYPE
}

"""Added in 26.3.0. Entity ordering field"""
enum EntityOrderField {
  ENTITY_TYPE
  REGISTERED_AT
}

# =============================================================================
# Union Types
# =============================================================================

union EntityNode =
    UserV2
  | ProjectV2
  | DomainV2
  | VirtualFolderNode
  | ImageV2
  | ComputeSessionNode
  | Artifact
  | ArtifactRegistry
  | AppConfig
  | NotificationChannel
  | NotificationRule
  | ModelDeployment
  | ResourceGroup
  | ArtifactRevision
  | Role

# =============================================================================
# Node Types (implements Relay Node interface)
# =============================================================================

"""Added in 26.3.0. RBAC role"""
type Role implements Node {
  """The Globally Unique ID of this object"""
  id: ID!
  name: String!
  description: String
  source: RoleSource!
  status: RoleStatus!
  createdAt: DateTime!
  updatedAt: DateTime!
  deletedAt: DateTime
}

"""Added in 26.3.0. RBAC role assignment (user-role association)"""
type RoleAssignment implements Node {
  """The Globally Unique ID of this object"""
  id: ID!

  """The assigned user ID."""
  userId: UUID!

  """The assigned role ID."""
  roleId: UUID!

  """The user who granted this assignment."""
  grantedBy: UUID
  grantedAt: DateTime!

  """The assigned role."""
  role: Role

  """The assigned user."""
  user: UserV2
}

"""Added in 26.3.0. RBAC scoped permission"""
type Permission implements Node {
  """The Globally Unique ID of this object"""
  id: ID!
  roleId: UUID!
  scopeType: RBACElementType!
  scopeId: String!
  entityType: RBACElementType!
  operation: OperationType!

  """The role this permission belongs to."""
  role: Role

  """The scope this permission applies to."""
  scope: EntityNode
}

"""
Added in 26.3.0. Entity reference from the association_scopes_entities table
"""
type EntityRef implements Node {
  """The Globally Unique ID of this object"""
  id: ID!
  scopeType: RBACElementType!
  scopeId: String!
  entityType: RBACElementType!
  entityId: String!
  registeredAt: DateTime!

  """The resolved entity object."""
  entity: EntityNode
}

