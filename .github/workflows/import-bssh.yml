name: Import bssh binary

on:
    workflow_dispatch:
        inputs:
            tag:
                description: "Release tag to download (e.g., v0.1.0). Leave empty for latest."
                required: false
                type: string
    repository_dispatch:
        types: [bssh-release]

permissions:
    contents: write

jobs:
    import-binary:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v6

            - name: Get release tag
              id: get-tag
              run: |
                  if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
                    TAG="${{ github.event.client_payload.tag }}"
                  elif [ -n "${{ github.event.inputs.tag }}" ]; then
                    TAG="${{ github.event.inputs.tag }}"
                  else
                    # Get latest release tag
                    TAG=$(curl -s -H "Authorization: Bearer $GITHUB_TOKEN" https://api.github.com/repos/lablup/bssh/releases/latest | jq -r .tag_name)
                  fi
                  echo "tag=$TAG" >> $GITHUB_OUTPUT
                  echo "Using tag: $TAG"

            - name: Download bssh binaries
              run: |
                  TAG="${{ steps.get-tag.outputs.tag }}"
                  for ARCH in aarch64 x86_64; do
                    for TOOL in bssh bssh-server; do
                      URL="https://github.com/lablup/bssh/releases/download/${TAG}/${TOOL}-linux-${ARCH}-musl.tar.gz"
                      echo "Downloading from: $URL"
                      curl -fL -o tool.tar.gz "$URL"
                      tar -xzf tool.tar.gz
                      if [ -f "${TOOL}" ]; then
                        mv "${TOOL}" "${TOOL}.${ARCH}.bin"
                        chmod +x "${TOOL}.${ARCH}.bin"
                        echo "Binary extracted and renamed to ${TOOL}.${ARCH}.bin"
                      else
                        echo "Error: ${TOOL} binary not found in the archive for $ARCH"
                        exit 1
                      fi
                      rm -f tool.tar.gz
                    done
                  done

            - name: Move binaries to target location
              run: |
                  TARGET_DIR="src/ai/backend/runner"
                  mkdir -p "${TARGET_DIR}"
                  # Move executable binaries
                  for ARCH in aarch64 x86_64; do
                    for TOOL in bssh bssh-server; do
                      mv "${TOOL}.${ARCH}.bin" "${TARGET_DIR}/"
                      echo "Binary moved to ${TARGET_DIR}/${TOOL}.${ARCH}.bin"
                      ls -la "${TARGET_DIR}/${TOOL}.${ARCH}.bin"
                    done
                  done
                  # Move manpages (only bssh currently ships a manpage)
                  for MAN in bssh.1 bssh-server.1; do
                    if [ -f "${MAN}" ]; then
                      mv "${MAN}" "${TARGET_DIR}/"
                      echo "Manpage moved to ${TARGET_DIR}/${MAN}"
                    fi
                  done

            - name: Add news fragment
              run: |
                  echo "Update bssh and bssh-server binaries to ${{ steps.get-tag.outputs.tag }}" > changes/.deps.md

            - name: Create pull request
              uses: peter-evans/create-pull-request@v7
              with:
                  token: ${{ secrets.OCTODOG }}
                  commit-message: "chore: Update bssh and bssh-server binaries to ${{ steps.get-tag.outputs.tag }}"
                  title: "deps: Update bssh and bssh-server binaries to ${{ steps.get-tag.outputs.tag }}"
                  author: "Lablup Octodog <mu001@lablup.com>"
                  body: |
                      This PR updates the bssh and bssh-server binaries (musl variant) for both aarch64 and x86_64 architectures to version ${{ steps.get-tag.outputs.tag }}.

                      Source: https://github.com/lablup/bssh/releases/tag/${{ steps.get-tag.outputs.tag }}

                      This update was triggered by:
                      - Event: ${{ github.event_name }}
                      ${{ github.event_name == 'repository_dispatch' && '- Automated trigger from bssh repository release' || '- Manual workflow dispatch' }}
                  branch: deps/update-bssh-${{ steps.get-tag.outputs.tag }}
                  delete-branch: true

    setup-webhook:
        if: github.event_name == 'workflow_dispatch'
        runs-on: ubuntu-latest
        steps:
            - name: Instructions for automated trigger
              run: |
                  echo "To enable automated triggers when bssh releases occur:"
                  echo ""
                  echo "1. Go to https://github.com/lablup/bssh/settings/hooks"
                  echo "2. Add a new webhook with:"
                  echo "   - Payload URL: https://api.github.com/repos/${{ github.repository }}/dispatches"
                  echo "   - Content type: application/json"
                  echo "   - Secret: (generate a secure secret)"
                  echo "   - Events: Select 'Releases'"
                  echo ""
                  echo "3. Configure the webhook payload:"
                  echo '   {'
                  echo '     "event_type": "bssh-release",'
                  echo '     "client_payload": {'
                  echo '       "tag": "{{ .Release.TagName }}"'
                  echo '     }'
                  echo '   }'
                  echo ""
                  echo "4. Add a GitHub Personal Access Token with 'repo' scope as a secret"
                  echo "   in the webhook Authorization header:"
                  echo "   Authorization: token YOUR_GITHUB_TOKEN"
