models:
- name: vllm-test-server
  model_path: /models
  service:
    start_command:
    - python3
    - /models/server.py
    port: 8000
    health_check:
      path: /health
      max_retries: 30
      initial_delay: 10
  metadata:
    author: E2E Test
    title: vLLM Test Server
    version: 1
    description: Simple HTTP server for vLLM image deployment testing
    task: Text Generation
    category: Language
    license: Apache-2.0
    framework:
    - vLLM
    min_resource:
      cpu: 1
      mem: 2g
