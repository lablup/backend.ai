## Backend.AI Agent (DaemonSet) values.

image:
  repository: backend.ai-agent
  tag: dev
  pullPolicy: IfNotPresent

imagePullSecrets: []

agent:
  # The agent joins a scaling group — must match what the manager announces
  # via etcd. `default` works for the initial install.
  scalingGroup: default

  # Etcd cluster the manager also talks to. Usually the in-cluster etcd
  # installed by the backend-ai-manager chart, reachable by Service DNS.
  etcd:
    host: bai-etcd.backend-ai.svc.cluster.local
    port: 2379
    namespace: local

  # RPC / agent-sock ports the DaemonSet opens on the host (hostNetwork=true).
  rpcPort: 6001
  agentSockPort: 6007
  containerPortRange: [30000, 32000]

  # Host-side directories the agent expects to read/write. All are mounted via
  # hostPath with DirectoryOrCreate where appropriate.
  hostPaths:
    varLib: /var/lib/backend.ai
    scratchRoot: /var/lib/backend.ai/scratches
    ipc: /var/run/backend.ai/ipc
    dockerSocket: /var/run/docker.sock
    # Host path used to stage the agent's krunner payload (runner/, kernel/,
    # helpers/ site-packages). The agent pod AND the host docker daemon both
    # need to see bind-mount sources at the same path, so we mount this host
    # path at the same location inside the agent container and prepend it to
    # PYTHONPATH — that way `files("ai.backend.runner")` resolves to a path
    # the host dockerd can open.
    krunner: /var/cache/backendai/krunner

  resources:
    requests:
      cpu: 200m
      memory: 512Mi

  # Agent must see the node's real hardware and reach host ports for spawned
  # containers. Setting these mirrors the DooD assumption.
  hostNetwork: true
  hostPID: true
  privileged: true

  # GPU (NVIDIA) support. When enabled, the agent pod is scheduled with
  # runtimeClassName=nvidia so nvidia-container-runtime injects the driver
  # libraries and /dev/nvidia* devices. Requires the node to have the
  # NVIDIA driver + nvidia-container-toolkit installed and a `nvidia`
  # RuntimeClass registered in the cluster.
  gpu:
    enabled: false
    runtimeClassName: nvidia
    visibleDevices: all
    driverCapabilities: compute,utility
    # Host CUDA toolkit path. nvidia-container-runtime injects the driver
    # libraries (libnvidia-ml) but NOT the CUDA runtime (libcudart). The
    # Backend.AI CUDA plugin needs libcudart to discover devices, so we
    # bind-mount the host's CUDA install read-only and prepend it to the
    # loader path.
    hostCudaPath: /usr/local/cuda

  # Reserved capacity taken away from the node's reported resources.
  reserved:
    cpu: 1
    memory: 1G
    disk: 8G

  # Kernel lifecycle polling timeouts (see `ai.backend.agent.config.unified
  # .KernelLifecyclesConfig`). Defaults match the upstream 60s which is too
  # tight for GPU kernels on the FIRST session after an agent pod restart:
  # nvidia-container-runtime setup + first CUDA context init pushes
  # `check_status` past the default window. Raising the window lets the
  # retry loop absorb that one-shot cost.
  kernelLifecycles:
    initPollingAttempt: 20
    initPollingTimeoutSec: 180.0
    initTimeoutSec: 120.0

  # Extra tolerations/nodeSelector/affinity to limit where the agent runs.
  nodeSelector: {}
  tolerations:
    # Tolerate common agent-node taints; adjust in production.
    - operator: Exists
      effect: NoSchedule
  affinity: {}
