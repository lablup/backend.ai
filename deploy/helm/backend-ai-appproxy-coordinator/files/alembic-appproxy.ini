# Alembic config for the app-proxy coordinator. Mirrors
# src/ai/backend/install/configs/alembic-appproxy.ini, with the
# sqlalchemy.url replaced at Job runtime by the render-config initContainer.

[alembic]
script_location = ai.backend.appproxy.coordinator.models:alembic

sqlalchemy.url = __DB_URL__


[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
