## Override for the CPU-only agent release.
## Runs on all non-GPU nodes so the GPU DaemonSet (values-agent-gpu.yaml) does
## not collide with this one on the same node.
##
## Usage:
##   helm upgrade --install bai-agent deploy/helm/backend-ai-agent \
##     -n backend-ai -f deploy/helm/values-agent-cpu.yaml

image:
  repository: 192.168.0.156:5000/backend.ai-agent
  tag: dev
  pullPolicy: IfNotPresent

agent:
  gpu:
    enabled: false
  # Exclude GPU nodes (owned by `bai-agent-gpu`) and control-plane nodes
  # (no docker.sock for DooD — agent's `/var/run/docker.sock` mount fails).
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: accelerator
                operator: NotIn
                values: [gpu]
              - key: node-role.kubernetes.io/control-plane
                operator: DoesNotExist
