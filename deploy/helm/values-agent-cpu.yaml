## Override for the CPU-only agent release.
## Runs on all non-GPU nodes so the GPU DaemonSet (values-agent-gpu.yaml) does
## not collide with this one on the same node.
##
## Usage:
##   helm upgrade --install bai-agent deploy/helm/backend-ai-agent \
##     -n backend-ai -f deploy/helm/values-agent-cpu.yaml

image:
  repository: backend.ai-agent
  tag: dev
  pullPolicy: IfNotPresent

agent:
  gpu:
    enabled: false
  # Exclude GPU nodes — that node is owned by the `bai-agent-gpu` release.
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: accelerator
                operator: NotIn
                values: [gpu]
