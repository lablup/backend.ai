{{- if .Values.etcdSeed.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "bai-manager.fullname" . }}-etcd-seed
  labels:
    {{- include "bai-manager.labels" . | nindent 4 }}
data:
  etcd-seed.json: |-
{{- $seed := .Values.etcdSeed.config | deepCopy }}
{{/*
  The agent reads this block from etcd and only supports the `addr` form.
  Default is the in-cluster Service DNS (bai-redis:6379) â€” fine for k8s-only
  consumers (manager, storage-proxy, appproxy). For the
  k8s-control-plane-and-native-agent scenario the host agent cannot resolve
  cluster DNS, so override `.Values.manager.redisExternalAddr` to the
  externally reachable host:port (e.g. NodePort or LoadBalancer). The seed
  re-applies on every helm upgrade, so this stays consistent â€” no manual
  `etcdctl put` step.

  Bitnami redis in sentinel mode exposes a Service whose endpoints track the
  current master (sentinel sidecar relabels pods on failover), so pointing
  there by Service DNS gives failover semantics with a simple standalone URL.
*/}}
{{- $redisAddr := default (printf "%s:6379" (include "bai-manager.redisHost" .)) .Values.manager.redisExternalAddr }}
{{- $_ := set $seed "redis" (dict
    "addr" $redisAddr
    "password" .Values.redis.password) }}
    {{- toJson $seed | nindent 4 }}
{{- if .Values.storageProxy.enabled }}
{{/*
  Storage-proxy registration written under the `volumes/` prefix via a second
  `mgr etcd put-json volumes /seed/volumes-seed.json` invocation in the Job
  below. Manager reads these at startup (StorageSessionManager) to build its
  proxy list. Keys under `volumes/proxies/<name>/{client_api, manager_api,
  secret, ssl_verify}` match the VolumeProxyConfig schema â€” any deviation
  causes `StorageProxyNotFound` at folder-op time.
*/}}
{{- $firstVolume := index .Values.storageProxy.volumes 0 }}
{{/*
  Build the _types map so manager allows the listed ownership kinds when
  vfolders are created. Each enabled type is stored as an empty etcd key
  under `volumes/_types/<type>` â€” the keys' *presence* is what enables them.
*/}}
{{- $vfolderTypes := dict }}
{{- range .Values.storageProxy.allowedVfolderTypes }}
  {{- $_ := set $vfolderTypes . "" }}
{{- end }}
{{- $volumesSeed := dict
    "default_host" (printf "%s:%s" .Values.storageProxy.proxyName $firstVolume.name)
    "_types" $vfolderTypes
    "proxies" (dict
        .Values.storageProxy.proxyName (dict
            "client_api" (printf "http://%s:%v" .Values.storageProxy.clientApiHost .Values.storageProxy.clientApiPort)
            "manager_api" (printf "http://%s:%v" .Values.storageProxy.managerApiHost .Values.storageProxy.managerApiPort)
            "secret" .Values.storageProxy.managerSecret
            "ssl_verify" (ternary "true" "false" .Values.storageProxy.sslVerify)
        )
    )
}}
  volumes-seed.json: |-
    {{- toJson $volumesSeed | nindent 4 }}
{{- end }}
{{- end }}
