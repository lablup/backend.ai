{{- if .Values.etcdSeed.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "bai-manager.fullname" . }}-etcd-seed
  labels:
    {{- include "bai-manager.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "1"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        {{- include "bai-manager.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: etcd-seed
    spec:
      restartPolicy: OnFailure
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets: {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        - name: render-config
          image: busybox:1.36
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              sed \
                -e "s|__POSTGRES_PASSWORD__|$POSTGRES_PASSWORD|g" \
                -e "s|__REDIS_PASSWORD__|$REDIS_PASSWORD|g" \
                -e "s|__MANAGER_SECRET__|$MANAGER_SECRET|g" \
                /config-in/manager.toml > /config-out/manager.toml
          env:
            - name: POSTGRES_PASSWORD
              valueFrom: { secretKeyRef: { name: {{ include "bai-manager.fullname" . }}-secrets, key: postgres-password } }
            - name: REDIS_PASSWORD
              valueFrom: { secretKeyRef: { name: {{ include "bai-manager.fullname" . }}-secrets, key: redis-password } }
            - name: MANAGER_SECRET
              valueFrom: { secretKeyRef: { name: {{ include "bai-manager.fullname" . }}-secrets, key: manager-secret } }
          volumeMounts:
            - { name: config-template, mountPath: /config-in }
            - { name: config-rendered, mountPath: /config-out }
        - name: wait-for-etcd
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z {{ include "bai-manager.etcdHost" . }} 2379; do
                echo "waiting for etcd..."; sleep 3;
              done
      containers:
        - name: seed
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          # Chain both seeds in one Pod so they share the rendered
          # manager.toml (render-config initContainer writes to an emptyDir
          # that does not survive across Pods). `set -e` aborts on the first
          # failure — volumes seed must not mask a failed global config seed.
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              backend.ai mgr --config /etc/backend.ai/manager.toml etcd put-json config /seed/etcd-seed.json
              {{- if .Values.storageProxy.enabled }}
              backend.ai mgr --config /etc/backend.ai/manager.toml etcd put-json volumes /seed/volumes-seed.json
              {{- end }}
          volumeMounts:
            - name: config-rendered
              mountPath: /etc/backend.ai
              readOnly: true
            - name: etcd-seed
              mountPath: /seed
              readOnly: true
      volumes:
        - name: config-template
          configMap:
            name: {{ include "bai-manager.fullname" . }}-config
        - name: config-rendered
          emptyDir: {}
        - name: etcd-seed
          configMap:
            name: {{ include "bai-manager.fullname" . }}-etcd-seed
{{- end }}
