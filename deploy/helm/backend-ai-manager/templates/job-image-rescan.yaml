{{- if and .Values.imageRescan.enabled .Values.fixture.enabled .Values.containerRegistries }}
{{- /*
  Post-install Job that runs `mgr image rescan <registry>` for each unique
  registryName found in .Values.containerRegistries. Must run AFTER:
    - schema-migrate (weight 0) — `images` table exists
    - fixture-populate (weight 2) — `container_registries` rows are present
  Weight 4 keeps it after the coordinator db-init Job (weight 3) for clean
  log ordering — they don't actually depend on each other.

  Requires the cluster pod to have outbound HTTPS access to the registries
  listed. Skip by setting `imageRescan.enabled: false` in air-gapped envs.
*/}}
{{- /*
  Build a deduplicated list of registryName strings. Multiple
  containerRegistries entries can share a registryName (different projects),
  and we only need to rescan each registry once — the rescan walks all
  projects belonging to that registry.
*/}}
{{- $regNames := list }}
{{- range $reg := .Values.containerRegistries }}
  {{- if not (has $reg.registryName $regNames) }}
    {{- $regNames = append $regNames $reg.registryName }}
  {{- end }}
{{- end }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "bai-manager.fullname" . }}-image-rescan
  labels:
    {{- include "bai-manager.labels" . | nindent 4 }}
    app.kubernetes.io/component: image-rescan
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "4"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        {{- include "bai-manager.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: image-rescan
    spec:
      restartPolicy: OnFailure
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets: {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        - name: render-config
          image: busybox:1.36
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              for f in manager.toml alembic.ini; do
                sed -e "s|__POSTGRES_PASSWORD__|$POSTGRES_PASSWORD|g" \
                    -e "s|__REDIS_PASSWORD__|$REDIS_PASSWORD|g" \
                    -e "s|__MANAGER_SECRET__|$MANAGER_SECRET|g" \
                    /config-in/$f > /config-out/$f
              done
          env:
            - name: POSTGRES_PASSWORD
              valueFrom: { secretKeyRef: { name: {{ include "bai-manager.fullname" . }}-secrets, key: postgres-password } }
            - name: REDIS_PASSWORD
              valueFrom: { secretKeyRef: { name: {{ include "bai-manager.fullname" . }}-secrets, key: redis-password } }
            - name: MANAGER_SECRET
              valueFrom: { secretKeyRef: { name: {{ include "bai-manager.fullname" . }}-secrets, key: manager-secret } }
          volumeMounts:
            - { name: config-template, mountPath: /config-in }
            - { name: config-rendered, mountPath: /config-out }
      containers:
        - name: rescan
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              {{- range $regNames }}
              echo "===rescan {{ . }}==="
              backend.ai mgr --config /etc/backend.ai/manager.toml image rescan {{ . | quote }}
              {{- end }}
              echo "image rescan complete"
          volumeMounts:
            - name: config-rendered
              mountPath: /etc/backend.ai
              readOnly: true
      volumes:
        - name: config-template
          configMap:
            name: {{ include "bai-manager.fullname" . }}-config
        - name: config-rendered
          emptyDir: {}
{{- end }}
