{{- if .Values.schemaMigrate.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "bai-manager.fullname" . }}-schema-migrate
  labels:
    {{- include "bai-manager.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        {{- include "bai-manager.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: schema-migrate
    spec:
      restartPolicy: OnFailure
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets: {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        - name: render-config
          image: busybox:1.36
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              for f in manager.toml alembic.ini; do
                sed \
                  -e "s|__POSTGRES_PASSWORD__|$POSTGRES_PASSWORD|g" \
                  -e "s|__REDIS_PASSWORD__|$REDIS_PASSWORD|g" \
                  -e "s|__MANAGER_SECRET__|$MANAGER_SECRET|g" \
                  /config-in/$f > /config-out/$f
              done
          env:
            - name: POSTGRES_PASSWORD
              valueFrom: { secretKeyRef: { name: {{ include "bai-manager.fullname" . }}-secrets, key: postgres-password } }
            - name: REDIS_PASSWORD
              valueFrom: { secretKeyRef: { name: {{ include "bai-manager.fullname" . }}-secrets, key: redis-password } }
            - name: MANAGER_SECRET
              valueFrom: { secretKeyRef: { name: {{ include "bai-manager.fullname" . }}-secrets, key: manager-secret } }
          volumeMounts:
            - { name: config-template, mountPath: /config-in }
            - { name: config-rendered, mountPath: /config-out }
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z {{ include "bai-manager.postgresHost" . }} 5432; do
                echo "waiting for postgres..."; sleep 3;
              done
      containers:
        - name: schema
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          workingDir: /etc/backend.ai
          args:
            - mgr
            - --config
            - /etc/backend.ai/manager.toml
            - schema
            - oneshot
            - -f
            - /etc/backend.ai/alembic.ini
          volumeMounts:
            - name: config-rendered
              mountPath: /etc/backend.ai
              readOnly: true
      volumes:
        - name: config-template
          configMap:
            name: {{ include "bai-manager.fullname" . }}-config
        - name: config-rendered
          emptyDir: {}
{{- end }}
