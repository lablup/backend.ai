{{- /*
External NodePort services for the in-cluster dependencies, so a host-side
agent process (running outside k8s) can reach etcd / redis without going
through pod DNS. The internal headless / ClusterIP services in deps.yaml
keep handling pod-to-pod traffic.
*/}}
{{- if .Values.manager.exposeDepsAsNodePort }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-etcd-external
  labels:
    {{- include "bai-manager.labels" . | nindent 4 }}
spec:
  type: NodePort
  selector:
    app.kubernetes.io/component: etcd
  ports:
    - name: client
      port: 2379
      targetPort: 2379
      nodePort: {{ .Values.manager.etcdNodePort | default 32379 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-redis-external
  labels:
    {{- include "bai-manager.labels" . | nindent 4 }}
spec:
  type: NodePort
  selector:
    app.kubernetes.io/component: redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
      nodePort: {{ .Values.manager.redisNodePort | default 32679 }}
{{- end }}
