## Backend.AI Manager Helm values (dev/smoke: single-replica deps, no HA).

image:
  repository: 192.168.0.156:5000/backend.ai-manager
  tag: dev
  pullPolicy: Always

imagePullSecrets: []

manager:
  replicaCount: 1
  # Host docker group GID — must match `getent group docker` on the node the
  # manager pod is pinned to (nodeSelector below).
  dockerGid: 999
  service:
    type: ClusterIP
    port: 8081
  bindPort: 8081
  secret: "CHANGE-ME-MANAGER-SECRET"
  extraEnv: []
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 2Gi
  podAnnotations: {}
  # Pin to the Swarm leader node. See todo.md §5.2 I-21.
  nodeSelector: {}
  # If the target node has a Backend.AI-specific taint (e.g., ser8 carries
  # `backendai.io/dedicated=swarm-manager:NoSchedule`), tolerate it here.
  # tolerations:
  #   - key: backendai.io/dedicated
  #     operator: Equal
  #     value: swarm-manager
  #     effect: NoSchedule
  tolerations: []
  affinity: {}

  # ---------------- External addresses (k8s-control-plane-and-native-agent) ----
  # The three addresses the host agent and external clients need to reach the
  # k8s-resident control plane. Defaults empty → cluster-internal usage only.
  #
  # `redisExternalAddr` is *seeded into etcd at config/redis/addr* by the
  # etcd-seed Job — chart actively uses it. The other two are *declared intent*
  # only: the chart doesn't consume them at runtime, but they form a single
  # source of truth that the agent.toml / `./bai` CLI config / Ansible
  # provisioning should read. Surfaced via NOTES.txt after `helm install`.
  #
  # Recommended values:
  #   - bare-metal lab : "<swarm-manager-node-ip>:<nodePort>"
  #   - bare-metal prod: LB IP or DNS FQDN (e.g. "bai-lb.example.com:6379")
  #   - cloud k8s      : LB service hostname (Service type: LoadBalancer)
  redisExternalAddr: ""    # config/redis/addr — seeded
  etcdExternalAddr: ""     # agent.toml [etcd] addr — operator writes to host
  managerExternalAddr: ""  # ./bai CLI config / external HTTP clients

## ---------------- Embedded deps (single replica, no HA) ----------------
postgres:
  image: postgres:16
  username: backendai
  database: backendai
  password: "CHANGE-ME-POSTGRES-PASSWORD"
  storage:
    size: 20Gi
    storageClassName: ""   # empty → cluster default

redis:
  image: redis:7
  password: "CHANGE-ME-REDIS-PASSWORD"
  storage:
    size: 4Gi
    storageClassName: ""

etcd:
  image: quay.io/coreos/etcd:v3.5.15
  storage:
    size: 4Gi
    storageClassName: ""

## Seed etcd with Backend.AI global config on first install (Helm hook Job).
etcdSeed:
  enabled: true
  config:
    system:
      timezone: "UTC"
    docker:
      image:
        auto_pull: "digest"
    network:
      subnet:
        agent: "0.0.0.0/0"
        container: "0.0.0.0/0"

## Storage-proxy registration written into etcd at
## `volumes/proxies/<proxyName>/{client_api,manager_api,secret,ssl_verify}`
## by a secondary hook Job. Manager reads these keys at startup (see
## StorageSessionManager) to discover proxies and their credentials.
##
## `clientApiHost` / `managerApiHost` MUST be reachable from the consumers:
##   - client_api: user machines, kernel containers → external host IP
##   - manager_api: manager Pod → in-cluster host IP (same ser8 node works)
## For the lab both point at ser8's node IP.
storageProxy:
  enabled: true
  proxyName: proxy1
  clientApiHost: "192.168.0.156"   # ser8 node IP, override in values-local.yaml
  clientApiPort: 6021
  managerApiHost: "192.168.0.156"
  managerApiPort: 6022
  # MUST match `storageProxy.managerSecret` in values-storage-proxy-local.yaml.
  managerSecret: "CHANGE-ME-STORAGE-MANAGER-SECRET"
  sslVerify: false
  # Ownership types (`user` / `group`) permitted when a vfolder is created.
  # Written into etcd at `/sorna/<ns>/volumes/_types/<type>` — manager reads
  # this prefix on vfolder operations and rejects ownership types not listed
  # here with "user-owned vfolder is not allowed in this cluster" (or the
  # analogous message for group). Empty list → no vfolder creation allowed.
  allowedVfolderTypes:
    - user
    - group
  # Volumes exposed on the default_host. Order matters — the first volume's
  # `proxyName:name` string is used as `volumes.default_host`.
  volumes:
    - name: volume1
      # Publicly advertised capabilities of this volume. Manager filters
      # proxies by these when a client asks for a folder with specific needs.
      backend: vfs

schemaMigrate:
  enabled: true

fixture:
  enabled: true

## Container registries — single source of truth for both the
## `container_registries` DB rows AND the post-install `mgr image rescan`.
##
## The fixture ConfigMap renders `11-container-registries.json` from this list
## at chart-template time (one DB row per (registryName, project) combo, with
## a deterministic SHA-256 derived id). The image-rescan Job iterates over
## the unique `registryName` values and runs `mgr image rescan <name>` for
## each, populating the `images` table so the Web UI's session-create dialog
## can list runtime versions.
##
## To swap to a private registry, edit ONLY this list — no other files.
## Empty list disables both the fixture and the rescan.
containerRegistries:
  - registryName: cr.backend.ai
    url: https://cr.backend.ai
    type: harbor2
    projects:
      - stable
      - community
      - multiarch
    # username / password optional — set for private registries that need auth.
    # username: ""
    # password: ""

## Image rescan toggle. Set false in air-gapped clusters with no outbound
## HTTPS to the registries listed above; you'll need to populate the `images`
## table by other means (e.g., agent-reported local images).
imageRescan:
  enabled: true
