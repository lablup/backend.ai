## Backend.AI Manager Helm values.
## For production, override all passwords/secrets and pin image digests.

image:
  repository: backend.ai-manager
  tag: dev
  pullPolicy: IfNotPresent

imagePullSecrets: []

manager:
  replicaCount: 1
  # Host docker group GID — needed so the manager (uid 1000, backendai) can
  # access /var/run/docker.sock mounted from the node. Set to the output of
  # `getent group docker` on the target node (e.g., 999 on minikube/Debian).
  dockerGid: 999
  service:
    type: ClusterIP
    port: 8081
  # Internal Pod port the manager binds to.
  bindPort: 8081
  # JWT / signing secret. Override in production via --set-string or an external Secret.
  secret: "CHANGE-ME-MANAGER-SECRET"
  # Additional env vars injected into the manager container.
  extraEnv: []
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 2Gi
  podAnnotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

## Seed etcd with Backend.AI global config on first install (Helm hook Job).
etcdSeed:
  enabled: true
  # Rendered into a ConfigMap and fed to `backend.ai mgr etcd put-json CONFIG`.
  config:
    system:
      timezone: "UTC"
    redis:
      addr: ""  # filled in by the chart from the redis subchart service
    docker:
      image:
        auto_pull: "digest"
    network:
      subnet:
        agent: "0.0.0.0/0"
        container: "0.0.0.0/0"

## Run `backend.ai mgr schema oneshot` on install/upgrade (Helm hook Job).
schemaMigrate:
  enabled: true

## ---------------- Subchart: PostgreSQL HA (Patroni) ----------------
postgresql-ha:
  enabled: true
  postgresql:
    replicaCount: 3
    username: backendai
    password: "CHANGE-ME-POSTGRES-PASSWORD"
    database: backendai
    repmgrPassword: "CHANGE-ME-REPMGR-PASSWORD"
  pgpool:
    adminPassword: "CHANGE-ME-PGPOOL-ADMIN"
    replicaCount: 2
  persistence:
    enabled: true
    size: 20Gi

## ---------------- Subchart: Redis (replication + Sentinel) ---------
redis:
  enabled: true
  architecture: replication
  auth:
    enabled: true
    password: "CHANGE-ME-REDIS-PASSWORD"
    sentinel: true
  sentinel:
    enabled: true
    masterSet: mymaster
    quorum: 2
  replica:
    replicaCount: 3

## ---------------- Subchart: etcd -----------------------------------
etcd:
  enabled: true
  replicaCount: 3
  auth:
    rbac:
      create: false  # Backend.AI connects without auth by default; enable later
  persistence:
    enabled: true
    size: 8Gi
